tools:
  - tool_id: handbook_lookup_service
    tool_name: Handbook Lookup Service
    tool_type: knowledge_lookup
    permitted_operations:
      - read synthetic handbook passages
      - return cited handbook snippets
    prohibited_operations:
      - modify handbook source data
      - write back to hr systems
    requires_human_approval: false
    side_effect_level: none
  - tool_id: request_context_reader
    tool_name: Request Context Reader
    tool_type: internal_service
    permitted_operations:
      - read synthetic request metadata
      - attach request category labels
    prohibited_operations:
      - retrieve private employee records
      - open payroll or benefits administration flows
    requires_human_approval: false
    side_effect_level: none
